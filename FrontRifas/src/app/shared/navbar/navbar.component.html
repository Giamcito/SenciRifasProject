<header class="navbar">
  <div class="navbar-content">
    <h1 class="logo">SenciRifas</h1>
    
    <nav class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Inicio</a>
      <a routerLink="/features" routerLinkActive="active">Características</a>
      <a routerLink="/about" routerLinkActive="active">Sobre nosotros</a>
      <a routerLink="/contact" routerLinkActive="active">Contacto</a>
    </nav>

    <!-- Contador de sesión si hay sesión iniciada -->
    <div class="session-timer-navbar" *ngIf="currentUser$ | async">
      <span class="timer-icon">⏱️</span>
      <span class="timer-text">{{ timeRemaining }}</span>
    </div>

    <!-- Si NO hay sesión iniciada -->
    <div class="auth-buttons" *ngIf="!(currentUser$ | async)">
      <a routerLink="/login" class="btn btn-login">Iniciar sesión</a>
      <a routerLink="/register" class="btn btn-register">Registrarse</a>
    </div>

    <!-- Si SÍ hay sesión iniciada -->
    <div class="auth-buttons" *ngIf="currentUser$ | async as user">
      <a routerLink="/dashboard" class="btn btn-dashboard">Dashboard</a>
      <button class="btn btn-logout" (click)="logout()">Cerrar sesión</button>
    </div>
  </div>
</header>
