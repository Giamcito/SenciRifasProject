<header class="navbar">
  <div class="navbar-content">
    <!-- Hamburguesa del sidebar (solo en móviles) -->
    <button class="navbar-hamburger-menu" (click)="toggleSidebar()" *ngIf="currentUser$ | async">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>

    <h1 class="logo">SenciRifas</h1>
    
    <nav class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Inicio</a>
      <a routerLink="/features" routerLinkActive="active">Características</a>
      <a routerLink="/about" routerLinkActive="active">Sobre nosotros</a>
      <a routerLink="/contact" routerLinkActive="active">Contacto</a>
    </nav>

    <!-- Contador de sesión si hay sesión iniciada -->
    <div class="session-timer-navbar" *ngIf="currentUser$ | async">
      <span class="timer-icon">⏱️</span>
      <span class="timer-text">{{ timeRemaining }}</span>
    </div>

    <!-- Si NO hay sesión iniciada -->
    <div class="auth-buttons" *ngIf="!(currentUser$ | async)">
      <a routerLink="/login" class="btn btn-login">Iniciar sesión</a>
      <a routerLink="/register" class="btn btn-register">Registrarse</a>
    </div>

    <!-- Si SÍ hay sesión iniciada -->
    <div class="auth-buttons" *ngIf="currentUser$ | async as user">
      <a routerLink="/dashboard" class="btn btn-dashboard">Dashboard</a>
      <button class="btn btn-logout" (click)="logout()">Cerrar sesión</button>
    </div>

    <!-- Hamburguesa del menú de usuario (solo en móviles) -->
    <button class="navbar-user-menu" (click)="toggleUserMenu()" *ngIf="currentUser$ | async">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
  </div>

  <!-- Menú de usuario desplegable (solo en móviles) -->
  <div class="navbar-user-dropdown" *ngIf="(currentUser$ | async) && userMenuOpen">
    <a routerLink="/" class="dropdown-item" (click)="userMenuOpen = false">🏠 Inicio</a>
    <a routerLink="/features" class="dropdown-item" (click)="userMenuOpen = false">✨ Características</a>
    <a routerLink="/about" class="dropdown-item" (click)="userMenuOpen = false">ℹ️ Sobre nosotros</a>
    <a routerLink="/contact" class="dropdown-item" (click)="userMenuOpen = false">📞 Contacto</a>
    <a routerLink="/dashboard" class="dropdown-item" (click)="userMenuOpen = false">📊 Dashboard</a>
    <button class="dropdown-item" (click)="logout()">🚪 Cerrar sesión</button>
  </div>
</header>
