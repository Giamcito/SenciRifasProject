<div class="auth-container">
  <div class="auth-box">
    <h2>Iniciar Sesión</h2>
    <p>Bienvenido de vuelta a SenciRifas</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          class="form-control"
          formControlName="email"
          placeholder="tu@email.com"
          [class.is-invalid]="submitted && f['email'].errors"
        />
        <div class="error" *ngIf="submitted && f['email'].errors">
          <span *ngIf="f['email'].errors['required']">Email es requerido</span>
          <span *ngIf="f['email'].errors['email']">Email inválido</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          class="form-control"
          formControlName="password"
          placeholder="Tu contraseña"
          [class.is-invalid]="submitted && f['password'].errors"
        />
        <div class="error" *ngIf="submitted && f['password'].errors">
          <span *ngIf="f['password'].errors['required']">Contraseña es requerida</span>
        </div>
      </div>

      <div class="error-message" *ngIf="error">
        {{ error }}
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ loading ? 'Cargando...' : 'Iniciar Sesión' }}
      </button>
    </form>

    <p class="auth-link">
      ¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a>
    </p>
  </div>
</div>
