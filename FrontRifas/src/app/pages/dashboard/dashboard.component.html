<div class="dashboard-wrapper">
  <!-- Botón Hamburguesa (solo en móviles) -->
  <button class="hamburger-btn" (click)="toggleSidebar()">
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
  </button>

  <!-- Overlay (para cerrar sidebar al hacer clic afuera en móviles) -->
  <div class="sidebar-overlay" *ngIf="sidebarOpen" (click)="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="dashboard-sidebar" [class.open]="sidebarOpen">
    <div class="sidebar-header">
      <h3>Menú</h3>
      <button class="close-sidebar-btn" (click)="closeSidebar()">✕</button>
    </div>
    
    <nav class="sidebar-menu">
      <!-- Botón Volver al Dashboard -->
      <a routerLink="/dashboard" class="menu-item home-btn" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeSidebar()">
        <span class="menu-icon">🏠</span>
        <span class="menu-text">Dashboard</span>
      </a>

      <!-- Divisor -->
      <div class="sidebar-divider"></div>

      <!-- Sección Gestión de Rifas -->
      <div class="menu-section">
        <button class="menu-header" (click)="toggleRifas()">
          <span class="menu-icon">📄</span>
          <span class="menu-text">Rifas</span>
          <span class="toggle-arrow" [class.expanded]="expandedRifas">▶</span>
        </button>
        
        <div class="submenu" [class.expanded]="expandedRifas">
          <a routerLink="crear-rifas" class="menu-item" routerLinkActive="active" (click)="closeSidebar()">
            <span class="menu-icon">📊</span>
            <span class="menu-text">Crear Rifas</span>
          </a>
          
          <a routerLink="administrar-rifas" class="menu-item" routerLinkActive="active" (click)="closeSidebar()">
            <span class="menu-icon">⚙️</span>
            <span class="menu-text">Administrar Rifas</span>
          </a>
          
          <a routerLink="venta-boletos" class="menu-item" routerLinkActive="active" (click)="closeSidebar()">
            <span class="menu-icon">💰</span>
            <span class="menu-text">Venta de Boletos</span>
          </a>
          
          <a routerLink="consultar-datos" class="menu-item" routerLinkActive="active" (click)="closeSidebar()">
            <span class="menu-icon">🔎</span>
            <span class="menu-text">Consultar Datos</span>
          </a>
        </div>
      </div>

      <!-- Divisor -->
      <div class="sidebar-divider"></div>

      <!-- Sección Vendedores -->
      <div class="menu-section">
        <button class="menu-header" (click)="toggleVendedores()">
          <span class="menu-icon">👥</span>
          <span class="menu-text">Vendedores</span>
          <span class="toggle-arrow" [class.expanded]="expandedVendedores">▶</span>
        </button>
        
        <div class="submenu" [class.expanded]="expandedVendedores">
          <a routerLink="crear-vendedor" class="menu-item" routerLinkActive="active" (click)="closeSidebar()">
            <span class="menu-icon">👤</span>
            <span class="menu-text">Crear Vendedor</span>
          </a>
          
          <a routerLink="administrar-vendedor" class="menu-item" routerLinkActive="active" (click)="closeSidebar()">
            <span class="menu-icon">👥</span>
            <span class="menu-text">Administrar Vendedor</span>
          </a>
        </div>
      </div>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="dashboard-main">
    <div class="dashboard-header">
      <h1>¡Bienvenido {{ user?.nombre }}!</h1>
    </div>

    <div class="dashboard-content">
      <!-- Router Outlet para cargar componentes dinámicamente -->
      <div class="section-content">
        <router-outlet></router-outlet>
      </div>
    </div>
  </main>
</div>
